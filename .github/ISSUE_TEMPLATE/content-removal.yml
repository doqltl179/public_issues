name: 비노출·삭제 요청
description: 원문 삭제, 비공개 전환, 잘못된 출처 연결, 권리자 요청 등 노출 중단 요청
title: "[비노출 요청] "
labels:
  - type:removal
body:
  - type: markdown
    attributes:
      value: |
        공개 저장소로 접수되는 이슈입니다.
        민감한 개인정보는 적지 말고, 문제 페이지 URL과 원문 URL, 공개 가능한 설명과 근거 위주로 작성해 주세요.
  - type: input
    id: project_id
    attributes:
      label: 프로젝트 ID
      placeholder: web_job_information
    validations:
      required: true
  - type: input
    id: project_name
    attributes:
      label: 프로젝트 이름
      placeholder: 마감 캘린더
    validations:
      required: true
  - type: input
    id: project_repo
    attributes:
      label: 프로젝트 저장소
      placeholder: https://github.com/doqltl179/web_job_information
  - type: input
    id: project_site
    attributes:
      label: 프로젝트 사이트
      placeholder: https://web-job-information.pages.dev
    validations:
      required: true
  - type: input
    id: page_url
    attributes:
      label: 문제 페이지 URL
      placeholder: https://web-job-information.pages.dev/announcements/...
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: 원문 공고 URL
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: announcement_id
    attributes:
      label: 공고 ID
      placeholder: contest-00140b50c0
  - type: input
    id: announcement_title
    attributes:
      label: 공고 제목
      placeholder: 2026 예시 공모 공고
  - type: input
    id: source_name
    attributes:
      label: 출처명
      placeholder: 문화포털
  - type: dropdown
    id: removal_reason
    attributes:
      label: 요청 사유
      options:
        - 원문 삭제 또는 비공개 전환
        - 권리자 또는 기관 요청
        - 잘못된 출처 연결
        - 더 이상 공개되면 안 되는 정보
        - 기타
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 요청 상세
      description: 왜 비노출 또는 삭제가 필요한지 설명해 주세요.
      placeholder: 원문 페이지가 404로 내려갔고 현재 링크가 더 이상 유효하지 않습니다.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 확인 근거
      description: 공개 공지, 원문 상태, 공개 가능한 스크린샷 설명 등을 적어 주세요.
      placeholder: 기관 공지에 게시 종료 및 비공개 전환 안내가 포함되어 있습니다.
    validations:
      required: true
  - type: checkboxes
    id: public_notice
    attributes:
      label: 공개 저장소 확인
      options:
        - label: 민감한 개인정보를 적지 않았고 공개 가능한 정보만 남겼습니다.
          required: true
