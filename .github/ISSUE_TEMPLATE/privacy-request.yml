name: 개인정보·집계 문의
description: 방문 집계, 원문 클릭 집계, 보관 기간, opt-out 등 개인정보 및 집계 관련 문의
title: "[개인정보 문의] "
labels:
  - type:privacy
body:
  - type: markdown
    attributes:
      value: |
        공개 저장소로 접수되는 이슈입니다.
        민감한 개인정보는 적지 말고, 문의 대상 페이지와 공개 가능한 상황 설명 위주로 작성해 주세요.
  - type: input
    id: project_id
    attributes:
      label: 프로젝트 ID
      placeholder: web_job_information
    validations:
      required: true
  - type: input
    id: project_name
    attributes:
      label: 프로젝트 이름
      placeholder: 마감 캘린더
    validations:
      required: true
  - type: input
    id: project_repo
    attributes:
      label: 프로젝트 저장소
      placeholder: https://github.com/doqltl179/web_job_information
  - type: input
    id: project_site
    attributes:
      label: 프로젝트 사이트
      placeholder: https://web-job-information.pages.dev
    validations:
      required: true
  - type: input
    id: page_url
    attributes:
      label: 문제 페이지 URL
      placeholder: https://web-job-information.pages.dev/...
    validations:
      required: true
  - type: dropdown
    id: request_type
    attributes:
      label: 문의 유형
      options:
        - 방문·클릭 집계 문의
        - opt-out 동작 문의
        - 보관 기간 문의
        - 공개 가능한 개인정보 문의
        - 기타
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 문의 내용
      description: 어떤 상황에서 어떤 점이 궁금한지 적어 주세요.
      placeholder: 방문 통계 제외를 켠 뒤 어떤 항목이 더 이상 기록되지 않는지 확인하고 싶습니다.
    validations:
      required: true
  - type: checkboxes
    id: public_notice
    attributes:
      label: 공개 저장소 확인
      options:
        - label: 민감한 개인정보를 적지 않았고 공개 가능한 정보만 남겼습니다.
          required: true
